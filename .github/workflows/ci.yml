name: CI & Installation Validation

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-test:
    name: Build & Validate (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        include:
          - os: ubuntu-latest
            artifact_name: nedit_linux
            install_cmd: |
              chmod +x install.sh
              # Mocking the install.sh behavior locally since we can't curl from a non-pushed branch easily
              mkdir -p bin
              cp target/release/nedit bin/nedit
              export PATH="$PATH:$(pwd)/bin"
              nedit --debug
          - os: windows-latest
            artifact_name: nedit_windows.exe
            install_cmd: |
              # Run diagnostic on the built binary directly to ensure it works
              .\target\release\nedit.exe --debug
              
              # Test the installation script logic (simulated)
              $InstallDir = Join-Path $HOME "nedit_test_bin"
              New-Item -ItemType Directory -Path $InstallDir -Force
              Copy-Item "target/release/nedit.exe" -Destination (Join-Path $InstallDir "nedit.exe")
              $env:PATH += ";$InstallDir"
              nedit --debug

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y libx11-dev libxcb-shape0-dev libxcb-xfixes0-dev

    - name: Set up Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Build Release
      run: cargo build --release

    - name: Validate Binary Integrity (--debug)
      shell: bash
      run: |
        if [ "${{ matrix.os }}" == "windows-latest" ]; then
          ./target/release/nedit.exe --debug
        else
          ./target/release/nedit --debug
        fi

    - name: Test Installation Script Logic
      shell: pwsh
      run: |
        if ("${{ matrix.os }}" -eq "windows-latest") {
          Write-Host "Testing install.ps1 logic..."
          # We test the logic of the script because 'irm | iex' would try to download 
          # from the 'main' branch on GitHub, which might not have our current changes yet.
          $testInstallDir = Join-Path $PWD "test_install_dir"
          $testBinPath = Join-Path $testInstallDir "nedit.exe"
          New-Item -ItemType Directory -Path $testInstallDir -Force
          Copy-Item "target/release/nedit.exe" -Destination $testBinPath
          $env:PATH = "$testInstallDir;" + $env:PATH
          nedit --debug
        } else {
          Write-Host "Testing install.sh logic..."
          mkdir -p test_bin
          cp target/release/nedit test_bin/nedit
          chmod +x test_bin/nedit
          export PATH="$PATH:$(pwd)/test_bin"
          nedit --debug
        }

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact_name }}
        path: |
          target/release/nedit
          target/release/nedit.exe
