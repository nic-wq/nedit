name: Build and Release

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: nedit-linux
            asset_name: nedit
          - os: windows-latest
            artifact_name: nedit-windows
            asset_name: nedit.exe

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y libx11-dev libxcb-shape0-dev libxcb-xfixes0-dev

    - name: Set up Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Build
      run: cargo build --release

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact_name }}
        path: |
          target/release/${{ matrix.asset_name }}

  release:
    name: Nightly Release
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Linux Artifact
        uses: actions/download-artifact@v4
        with:
          name: nedit-linux
          path: ./linux

      - name: Download Windows Artifact
        uses: actions/download-artifact@v4
        with:
          name: nedit-windows
          path: ./windows

      - name: Prepare Binaries
        run: |
          mv ./linux/nedit ./nedit_linux
          mv ./windows/nedit.exe ./nedit_windows.exe
          chmod +x ./nedit_linux

      - name: Release Nightly
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: Nightly Build
          body: "Automated Real-time build. Contains the latest commits from the main branch. Use at your own risk."
          prerelease: true
          files: |
            nedit_linux
            nedit_windows.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
