name: Installation Script Validation

on:
  workflow_dispatch:
  release:
    types: [published]

jobs:
  validate-install:
    name: Test Install Script (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
    - name: Install Dependencies (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y libx11-dev libxcb-shape0-dev libxcb-xfixes0-dev

    - name: Run Windows Installation Script
      if: matrix.os == 'windows-latest'
      shell: pwsh
      run: |
        # Usando a versão local do script para testar as mudanças atuais, 
        # mas simulando o comportamento de download e PATH.
        # No futuro, para testar a URL pública, seria 'irm <url> | iex'
        ./install.ps1
        
        # O script adiciona ao PATH do usuário, mas no CI precisamos atualizar a sessão atual
        $InstallDir = Join-Path $env:LOCALAPPDATA "nedit\bin"
        $env:PATH = "$InstallDir;" + $env:PATH
        
        Write-Host "Verifying installation..."
        nedit --debug

    - name: Run Linux Installation Script
      if: matrix.os == 'ubuntu-latest'
      run: |
        # Mocking sudo for the install script in CI
        chmod +x install.sh
        # O install.sh original usa 'sudo mv'. Em CI, vamos garantir que funcione.
        ./install.sh
        
        export PATH="$PATH:/usr/local/bin"
        nedit --debug
