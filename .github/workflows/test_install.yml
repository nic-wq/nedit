name: Installation Script Validation

on:
  workflow_dispatch:
  release:
    types: [published, created, edited]

jobs:
  validate-install:
    name: Test Install Script (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
    - uses: actions/checkout@v4

    - name: Install Dependencies (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y libx11-dev libxcb-shape0-dev libxcb-xfixes0-dev

    - name: Run Windows Installation Script
      if: matrix.os == 'windows-latest'
      shell: pwsh
      run: |
        # Invoking the local script with -Unstable flag
        . ./install.ps1 -Unstable
        
        # The script adds to User PATH, but in CI we need to update the current session
        $InstallDir = Join-Path $env:LOCALAPPDATA "nedit\bin"
        $env:PATH = "$InstallDir;" + $env:PATH
        
        Write-Host "Verifying installation..."
        nedit --debug

    - name: Run Linux Installation Script
      if: matrix.os == 'ubuntu-latest'
      run: |
        chmod +x install.sh
        # Running with --unstable flag
        ./install.sh --unstable
        
        export PATH="$PATH:/usr/local/bin"
        nedit --debug
